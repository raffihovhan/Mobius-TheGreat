version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mobius_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     mobius_user
      POSTGRES_PASSWORD: mobius_pass
      POSTGRES_DB:       mobius
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mobius_user -d mobius"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mobius_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://mobius_user:mobius_pass@postgres:5432/mobius
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend     # hot-reload in dev

  # ── Vite Dev Server (optional — replace with nginx for prod) ────────────────
  frontend:
    image: node:20-alpine
    container_name: mobius_ui
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
